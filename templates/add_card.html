<!DOCTYPE html>
<html>
<head>
    <title>Add Card</title>
</head>
<body>
    <h1>Add a New Flashcard</h1>

    <form action="/add-card" method="post">
        <label>Choose deck:</label>
        <select name="deck_id" required>
            {% for deck in decks %}
                <option value="{{ deck[0] }}">{{ deck[1] }}</option>
            {% endfor %}
        </select>

        <br><br>

        <label>Front:</label>
        <input type="text" name="front" required>

        <br><br>

        <label>Back:</label>
        <input type="text" name="back" required>

        <br><br>

        <label>
            <input type="checkbox" name="add_reverse" value="yes">
            Also add reverse card
        </label>

        <br><br>

        <button type="submit">Add Card</button>
    </form>

    <p><a href="/review">Back to review</a></p>
</body>
</html>
