<!DOCTYPE html>
<html>
<head>
    <title>Add Card</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            background: #ffffff;
        }

        .site-banner {
            width: 100%;
            background: #f5f5f5;
            border-bottom: 1px solid #ddd;
            padding: 18px 40px;
            box-sizing: border-box;
        }

        .banner-content {
            max-width: 1100px;
            margin: 0 auto;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .brand-section {
            display: flex;
            align-items: center;
            gap: 14px;
        }

        .logo-placeholder {
            width: 44px;
            height: 44px;
            border-radius: 12px;
            background: #2563eb;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
        }

        .brand-name {
            font-size: 24px;
            font-weight: bold;
        }

        .banner-right {
            color: #666;
        }

        .banner-button {
            text-decoration: none;

            background: #2563eb;
            color: white;

            padding: 10px 18px;

            border-radius: 12px;

            font-weight: bold;

            transition: background 0.15s ease;
        }

        .banner-button:hover {
            background: #1d4ed8;
        }

        .page {
            max-width: 900px;
            margin: 60px auto;
            padding: 0 10px;
        }

        h1 {
            text-align: center;
        }

        .add-card {
            width: 70%;
            min-height: 30px;

            resize: none;

            overflow: hidden;

            padding: 12px;

            font-size: 16px;

            border-radius: 12px;

            border: 1px solid #ddd;

            box-sizing: border-box;

            font-size: large;
            text-align: center;

            display: flex;
            justify-content: center;
            align-items: center;

            margin: 0 auto -20px auto;
            
        }

        .add-label {
            display: block;
            text-align: center;
            font-weight: bold;
            margin: 50px auto 10px auto;
        }

        .add-card-button {
            display: block;
            margin: 10px 0px auto;
            padding: 12px 22px;
            font-size: 16px;
            border-radius: 14px;
            border: #2563eb;
            background: #2563eb;
            color: white;
            font-weight: bold;
            transition: background 0.15s ease;
            cursor: pointer;
            text-decoration: none;}

            .reverse-label {
                display: block;
                text-align: center;
                margin: 28px auto 0 auto;
                font-weight: bold;
            }

            .page-title {
                font-size: 14px;
                color: #666;
                margin-top: 2px;
                font-weight: bold;
            }

            .deck-selector-top-right {
                position: absolute;

                top: 100px;
                right: 40px;

                display: flex;
                align-items: center;

                gap: 10px;
            }

            .deck-selector-label {
                font-weight: bold;
            }

            .deck-selector {
                padding: 10px 14px;

                border-radius: 12px;

                border: 1px solid #ddd;

                font-size: 15px;
            }

            .button-row {
                display: flex;
                justify-content: center;
                gap: 16px;
                margin-top: 30px;
            }

            .smart-add-button {
                display: block;
                padding: 12px 22px;
                font-size: 16px;
                border-radius: 14px;
                border: none;
                background: #7c3aed;
                color: white;
                font-weight: bold;
                cursor: pointer;
                transition: background 0.15s ease;
            }

            .smart-add-button:hover {
                background: #6d28d9;
            }

            .banner-actions {
                display: flex;
                gap: 12px;
                align-items: center;
            }

            .banner-button.secondary {
                background: #e5e7eb;
                color: black;
            }

            .banner-button.secondary:hover {
                background: #d1d5db;
            }

            .cloze-editor {
                width: 70%;
                min-height: 120px;
                margin: 0 auto;
                padding: 16px;

                border: 1px solid #ddd;
                border-radius: 14px;

                font-size: 18px;
                line-height: 1.6;

                background: white;
            }

            .cloze-highlight {
                background: #dbeafe;
                color: #1d4ed8;
                padding: 2px 5px;
                border-radius: 6px;
                font-weight: bold;
            }

            .editor-row {
                width: 70%;
                margin: 0 auto;
                display: flex;
                gap: 12px;
                align-items: flex-start;
            }

            .rich-editor {
                flex: 1;
                min-height: 90px;
                padding: 14px;
                border: 1px solid #ddd;
                border-radius: 14px;
                font-size: 18px;
                line-height: 1.6;
                background: white;
                text-align: center;
            }

            .rich-editor img {
                max-width: 220px;
                max-height: 180px;
                display: block;
                margin: 12px auto;
                border-radius: 12px;
            }

            .image-insert-button {
                padding: 10px 14px;
                border-radius: 12px;
                border: none;
                background: #e5e7eb;
                font-weight: bold;
                cursor: pointer;
            }

            .image-insert-button:hover {
                background: #d1d5db;
            }

            .occlusion-editor {
                position: relative;
                min-height: 260px;
            }

            .occlusion-editor img {
                max-width: 100%;
                display: block;
                margin: 0 auto;
            }

            .occlusion-box {
                position: absolute;
                background: white;
                border: 2px solid #2563eb;
                cursor: pointer;
            }

            @media (max-width: 800px) {
            .banner-content {
                flex-direction: column;
                align-items: flex-start;
                gap: 10px;
            }

            .banner-actions {
                flex-wrap: wrap;
            }

            .deck-selector-top-right {
                position: static;
                margin: 20px auto;
                justify-content: center;
            }

            .add-card {
                width: 92%;
            }

            .button-row {
                flex-direction: column;
                align-items: center;
            }

            .add-card-button {
                width: 80%;
                text-align: center;
            }

            .editor-toolbar {
                display: flex;
                justify-content: center;
                gap: 10px;
                flex-wrap: wrap;
                margin: 30px auto 20px auto;
            }

            .editor-toolbar select,
            .editor-toolbar input,
            .editor-toolbar button {
                padding: 8px 12px;
                border-radius: 10px;
                border: 1px solid #ddd;
                font-weight: bold;
            }
        }
    </style>
</head>
<body>
    <header class="site-banner">
        <div class="banner-content">
            <div class="brand-section">

                <div class="logo-placeholder">
                    L
                </div>

                <div>

                    <div class="brand-name">
                        LanguageApp
                    </div>

                    <div class="page-title">
                        Add Card
                    </div>

                </div>

            </div>

            <div class="banner-right">

                <div class="banner-actions">

                    <a
                        href="#"
                        class="banner-button secondary"
                        onclick="goToSelectedDeck(event)"
                    >
                        View Deck
                    </a>

                    <a
                        href="#"
                        class="banner-button secondary"
                        onclick="goToSelectedReview(event)"
                    >
                        Review Deck
                    </a>

                    <a href="/" class="banner-button">
                        ← Back to Decks
                    </a>

                </div>

            </div>
        </div>
    </header>

    <form
        id="add-card-form"
        action="/add-card"
        method="post"
        enctype="multipart/form-data"
    >
        <div class="deck-selector-top-right">

            <label class="deck-selector-label">
                Deck
            </label>

            <select name="deck_id" required class="deck-selector">
                {% for deck in decks %}
                    <option
                        value="{{ deck[0] }}"
                        {% if selected_deck_id and deck[0] == selected_deck_id %}
                            selected
                        {% endif %}
                    >
                        {{ deck[1] }}
                    </option>
                {% endfor %}
            </select>

        </div>

        <label class="add-label">Card Type</label>

        <select name="card_type" id="card-type-select" class="deck-selector">
            <option value="basic">Basic</option>
            <option value="cloze">Cloze</option>
            <option value="image_occlusion">Image Occlusion</option>
        </select>

        <input type="hidden" name="front" id="front-hidden">

        <div id="basic-options">

            <label class="add-label">Front</label>
            <div class="editor-row">
                <div
                    id="front-basic-editor"
                    class="rich-editor"
                    contenteditable="true"
                ></div>

                <button
                    type="button"
                    class="image-insert-button"
                    onclick="chooseImageFor('front')"
                >
                    Insert Image
                </button>
            </div>

            <input type="hidden" id="front-basic-field">

            <label class="add-label">Back</label>
            <div class="editor-row">
                <div
                    id="back-editor"
                    class="rich-editor"
                    contenteditable="true"
                ></div>

                <button
                    type="button"
                    class="image-insert-button"
                    onclick="chooseImageFor('back')"
                >
                    Insert Image
                </button>
            </div>

            <input type="hidden" name="back" id="back-field">

            <label class="reverse-label">
                <input
                    type="checkbox"
                    name="add_reverse"
                    value="yes"
                    {% if add_reverse == "yes" %}
                        checked
                    {% endif %}
                >
                Add reverse card
            </label>

        </div>

        <div id="cloze-options">

            <label class="add-label">Cloze Text</label>

            <div class="editor-row">

                <div
                    id="cloze-editor"
                    class="rich-editor"
                    contenteditable="true"
                ></div>

                <button
                    type="button"
                    class="image-insert-button"
                    onclick="chooseImageFor('cloze')"
                >
                    Insert Image
                </button>

            </div>

            <button
                type="button"
                class="add-card-button"
                onclick="makeCloze()"
            >
                Make Cloze
            </button>

        </div>

        <div id="image-occlusion-options">

            <label class="add-label">Image Occlusion</label>

            <div class="editor-row">

                <div
                    id="occlusion-editor"
                    class="rich-editor occlusion-editor"
                    contenteditable="true"
                    tabindex="0"
                ></div>

                <button
                    type="button"
                    class="image-insert-button"
                    onclick="chooseImageFor('occlusion')"
                >
                    Insert Image
                </button>

            </div>

            <button
                type="button"
                class="add-card-button"
                id="draw-occlusion-button"
            >
                Draw Occlusion Box
            </button>

        </div>

        <div class="editor-toolbar">
            <select id="font-family">
                <option value="Arial">Arial</option>
                <option value="Helvetica">Helvetica</option>
                <option value="Verdana">Verdana</option>
                <option value="Tahoma">Tahoma</option>
                <option value="Trebuchet MS">Trebuchet MS</option>

                <option value="Georgia">Georgia</option>
                <option value="Times New Roman">Times New Roman</option>
                <option value="Garamond">Garamond</option>
                <option value="Palatino Linotype">Palatino</option>

                <option value="Courier New">Courier New</option>
                <option value="Consolas">Consolas</option>
                <option value="Lucida Console">Lucida Console</option>

                <option value="Comic Sans MS">Comic Sans</option>
                <option value="Impact">Impact</option>
            </select>

            <select id="font-size">
                <option value="8pt">8 pt</option>
                <option value="10pt">10 pt</option>
                <option value="12pt">12 pt</option>
                <option value="14pt">14 pt</option>
                <option value="16pt">16 pt</option>
                <option value="18pt">18 pt</option>
                <option value="20pt">20 pt</option>
                <option value="24pt" selected>24 pt</option>
                <option value="28pt">28 pt</option>
                <option value="32pt">32 pt</option>
                <option value="36pt">36 pt</option>
                <option value="42pt">42 pt</option>
                <option value="48pt">48 pt</option>
                <option value="60pt">60 pt</option>
                <option value="72pt">72 pt</option>
            </select>

            <input type="color" id="text-color" value="#000000">

            <button type="button" onclick="formatSelection('bold')">B</button>
            <button type="button" onclick="formatSelection('italic')">I</button>
            <button type="button" onclick="insertLatex()">LaTeX</button>
        </div>

       <input
            type="file"
            id="image-file"
            name="image"
            accept="image/*"
            hidden
        >

        <input
            type="hidden"
            name="pasted_image_data"
            id="pasted-image-data"
        >

        <div class="button-row">

            <button
                type="submit"
                class="add-card-button"
                formaction="/add-card"
            >
                Add Card
            </button>

            <button
                type="submit"
                class="add-card-button"
                formaction="/smart-add-card/preview"
            >
                Smart Add
            </button>

        </div>
    </form>

    <script>
        const form = document.getElementById("add-card-form");
        const cardTypeSelect = document.getElementById("card-type-select");

        const basicOptions = document.getElementById("basic-options");
        const clozeOptions = document.getElementById("cloze-options");

        const frontBasicField = document.getElementById("front-basic-field");
        const backField = document.getElementById("back-field");
        const frontHidden = document.getElementById("front-hidden");
        const clozeEditor = document.getElementById("cloze-editor");

        const imageOcclusionOptions = document.getElementById("image-occlusion-options");
        

        form.addEventListener("keydown", function(event) {
            if (event.ctrlKey && event.key === "Enter") {
                event.preventDefault();
                form.requestSubmit();
            }
        });

        document.querySelectorAll(".add-card").forEach(textarea => {
            textarea.addEventListener("input", () => {
                textarea.style.height = "auto";
                textarea.style.height = textarea.scrollHeight + "px";
            });
        });

        const imageFileInput = document.getElementById("image-file");

        function goToSelectedDeck(event) {
            event.preventDefault();

            const deckId = document.querySelector(
                "select[name='deck_id']"
            ).value;

            window.location.href = "/deck/" + deckId + "/cards";
        }

        function goToSelectedReview(event) {
            event.preventDefault();

            const deckId = document.querySelector(
                "select[name='deck_id']"
            ).value;

            window.location.href = "/review/" + deckId;
        }

        function makeCloze() {
            const selection = window.getSelection();

            if (!selection.rangeCount || selection.toString().trim() === "") {
                return;
            }

            const range = selection.getRangeAt(0);

            const span = document.createElement("span");
            span.className = "cloze-highlight";
            span.dataset.cloze = "true";

            range.surroundContents(span);

            selection.removeAllRanges();
        }

        function updateCardTypeView() {
            if (cardTypeSelect.value === "cloze") {
                basicOptions.style.display = "none";
                clozeOptions.style.display = "block";
                imageOcclusionOptions.style.display = "none";

                frontBasicField.required = false;
                backField.required = false;

            } else if (cardTypeSelect.value === "image_occlusion") {
                basicOptions.style.display = "none";
                clozeOptions.style.display = "none";
                imageOcclusionOptions.style.display = "block";

                frontBasicField.required = false;
                backField.required = false;

            } else {
                basicOptions.style.display = "block";
                clozeOptions.style.display = "none";
                imageOcclusionOptions.style.display = "none";

                frontBasicField.required = true;
                backField.required = true;
            }
        }

        cardTypeSelect.addEventListener("change", function () {

            localStorage.setItem(
                "selected_card_type",
                cardTypeSelect.value
            );

            updateCardTypeView();
        });

        const savedCardType =
            localStorage.getItem("selected_card_type");

        if (savedCardType) {
            cardTypeSelect.value = savedCardType;
        }

        updateCardTypeView();

        form.addEventListener("submit", function () {
            if (cardTypeSelect.value === "cloze") {
                let html = clozeEditor.innerHTML;

                html = html.replace(
                    /<span class="cloze-highlight" data-cloze="true">(.*?)<\/span>/g,
                    "{% raw %}{{c1::$1}}{% endraw %}"
                );

                html = html.replace(/<[^>]+>/g, "");

                frontHidden.value = html;
                backField.value = "cloze";
            } 

            else if (cardTypeSelect.value === "image_occlusion") {
                const editor = document.getElementById("occlusion-editor");

                frontHidden.value = editor.innerHTML;
                backField.value = "image_occlusion";
            }
            
            else {
                frontHidden.value =
                    document.getElementById("front-basic-editor").innerHTML;

                backField.value =
                    document.getElementById("back-editor").innerHTML;
            }
        });

        let activeImageTarget = null;

        function chooseImageFor(target) {
            activeImageTarget = target;
            document.getElementById("image-file").click();
        }

        function getEditorForTarget(target) {

            if (target === "front") {
                return document.getElementById("front-basic-editor");
            }

            if (target === "back") {
                return document.getElementById("back-editor");
            }

            if (target === "cloze") {
                return document.getElementById("cloze-editor");
            }

            if (target === "occlusion") {
                return document.getElementById("occlusion-editor");
            }
        }

        function insertImageIntoEditor(src, target) {
            const editor = getEditorForTarget(target);

            if (!editor) return;

            const img = document.createElement("img");
            img.src = src;

            editor.appendChild(img);
        }

        document.getElementById("image-file").addEventListener("change", function () {
            const file = this.files[0];

            if (!file || !activeImageTarget) return;

            const reader = new FileReader();

            reader.onload = function (event) {
                insertImageIntoEditor(event.target.result, activeImageTarget);
            };

            reader.readAsDataURL(file);
        });

        document.addEventListener("paste", function (event) {
            const activeEditor = document.activeElement;

            if (
                !activeEditor.classList.contains("rich-editor") &&
                !activeEditor.classList.contains("occlusion-editor")
            ) {
                return;
            }

            for (const item of event.clipboardData.items) {
                if (item.type.startsWith("image/")) {
                    event.preventDefault();

                    const file = item.getAsFile();
                    const reader = new FileReader();

                    reader.onload = function (e) {
                        const img = document.createElement("img");
                        img.src = e.target.result;

                        img.style.maxWidth = "100%";
                        img.style.display = "block";
                        img.style.margin = "0 auto";

                        activeEditor.innerHTML = "";
                        activeEditor.appendChild(img);
                    };

                    reader.readAsDataURL(file);
                    break;
                }
            }
        });

        let drawingOcclusion = false;
        let startX = 0;
        let startY = 0;
        let currentBox = null;

        document
            .getElementById("draw-occlusion-button")
            .addEventListener("click", function () {
                drawingOcclusion = true;
            });

        document
            .getElementById("occlusion-editor")
            .addEventListener("mousedown", function (event) {
                if (!drawingOcclusion) return;

                const editor = document.getElementById("occlusion-editor");
                const rect = editor.getBoundingClientRect();

                startX = event.clientX - rect.left;
                startY = event.clientY - rect.top;

                currentBox = document.createElement("div");
                currentBox.className = "occlusion-box";

                currentBox.style.left = startX + "px";
                currentBox.style.top = startY + "px";
                currentBox.style.width = "0px";
                currentBox.style.height = "0px";

                editor.appendChild(currentBox);
            });

        document
            .getElementById("occlusion-editor")
            .addEventListener("mousemove", function (event) {
                if (!drawingOcclusion || !currentBox) return;

                const editor = document.getElementById("occlusion-editor");
                const rect = editor.getBoundingClientRect();

                const currentX = event.clientX - rect.left;
                const currentY = event.clientY - rect.top;

                const left = Math.min(startX, currentX);
                const top = Math.min(startY, currentY);
                const width = Math.abs(currentX - startX);
                const height = Math.abs(currentY - startY);

                currentBox.style.left = left + "px";
                currentBox.style.top = top + "px";
                currentBox.style.width = width + "px";
                currentBox.style.height = height + "px";
            });

        document.addEventListener("mouseup", function () {
            if (!drawingOcclusion || !currentBox) return;

            drawingOcclusion = false;
            currentBox = null;
        });

        function formatSelection(command) {
            document.execCommand(command, false, null);
        }

        document.getElementById("font-family").addEventListener("change", function () {
            document.execCommand("fontName", false, this.value);
        });

        document.getElementById("font-size").addEventListener("change", function () {
            const size = this.value;
            const selection = window.getSelection();

            if (!selection.rangeCount) return;

            const range = selection.getRangeAt(0);
            const span = document.createElement("span");

            span.style.fontSize = size;
            span.appendChild(range.extractContents());
            range.insertNode(span);
        });

        document.getElementById("text-color").addEventListener("change", function () {
            document.execCommand("foreColor", false, this.value);
        });

        function insertLatex() {
            const latex = prompt("Enter LaTeX, e.g. x^2 + y^2 = z^2");

            if (!latex) return;

            document.execCommand(
                "insertHTML",
                false,
                `<span class="latex">\\(${latex}\\)</span>`
            );
        }
    </script>
</body>
</html>
