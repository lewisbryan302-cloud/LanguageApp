<!DOCTYPE html>
<html>
<head>
    <title>Add Card</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            background: #ffffff;
        }

        .site-banner {
            width: 100%;
            background: #f5f5f5;
            border-bottom: 1px solid #ddd;
            padding: 18px 40px;
            box-sizing: border-box;
        }

        .banner-content {
            max-width: 1100px;
            margin: 0 auto;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .brand-section {
            display: flex;
            align-items: center;
            gap: 14px;
        }

        .logo-placeholder {
            width: 44px;
            height: 44px;
            border-radius: 12px;
            background: #2563eb;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
        }

        .brand-name {
            font-size: 24px;
            font-weight: bold;
        }

        .banner-right {
            color: #666;
        }

        .banner-button {
            text-decoration: none;

            background: #2563eb;
            color: white;

            padding: 10px 18px;

            border-radius: 12px;

            font-weight: bold;

            transition: background 0.15s ease;
        }

        .banner-button:hover {
            background: #1d4ed8;
        }

        .page {
            max-width: 900px;
            margin: 60px auto;
            padding: 0 10px;
        }

        h1 {
            text-align: center;
        }

        .add-card {
            width: 70%;
            min-height: 30px;

            resize: none;

            overflow: hidden;

            padding: 12px;

            font-size: 16px;

            border-radius: 12px;

            border: 1px solid #ddd;

            box-sizing: border-box;

            font-size: large;
            text-align: center;

            display: flex;
            justify-content: center;
            align-items: center;

            margin: 0 auto -20px auto;
            
        }

        .add-label {
            display: block;
            text-align: center;
            font-weight: bold;
            margin: 20px auto 10px auto;
        }

        .add-card-button {
            display: block;
            margin: 10px 0px auto;
            padding: 12px 22px;
            font-size: 16px;
            border-radius: 14px;
            border: #2563eb;
            background: #2563eb;
            color: white;
            font-weight: bold;
            transition: background 0.15s ease;
            cursor: pointer;
            text-decoration: none;}

            .reverse-label {
                display: block;
                text-align: center;
                margin: 28px auto 0 auto;
                font-weight: bold;
            }

            .page-title {
                font-size: 14px;
                color: #666;
                margin-top: 2px;
                font-weight: bold;
            }

            .deck-selector-top-right {
                position: absolute;

                top: 85px;
                right: 40px;

                display: flex;
                align-items: center;

                gap: 10px;
            }

            .deck-selector-label {
                font-weight: bold;
            }

            .deck-selector {
                padding: 10px 14px;

                border-radius: 12px;

                border: 1px solid #ddd;

                font-size: 15px;
            }

            .button-row {
                display: flex;
                justify-content: center;
                gap: 16px;
                margin-top: 30px;
            }

            .smart-add-button {
                display: block;
                padding: 12px 22px;
                font-size: 16px;
                border-radius: 14px;
                border: none;
                background: #7c3aed;
                color: white;
                font-weight: bold;
                cursor: pointer;
                transition: background 0.15s ease;
            }

            .smart-add-button:hover {
                background: #6d28d9;
            }
    </style>
</head>
<body>
    <header class="site-banner">
        <div class="banner-content">
            <div class="brand-section">

                <div class="logo-placeholder">
                    L
                </div>

                <div>

                    <div class="brand-name">
                        LanguageApp
                    </div>

                    <div class="page-title">
                        Add Card
                    </div>

                </div>

            </div>

            <div class="banner-right">

                <a href="/" class="banner-button">
                    ← Back to Decks
                </a>

            </div>
        </div>
    </header>

    <form id="add-card-form" action="/add-card" method="post">
        <div class="deck-selector-top-right">

            <label class="deck-selector-label">
                Deck
            </label>

            <select name="deck_id" required class="deck-selector">
                {% for deck in decks %}
                    <option
                        value="{{ deck[0] }}"
                        {% if selected_deck_id and deck[0] == selected_deck_id %}
                            selected
                        {% endif %}
                    >
                        {{ deck[1] }}
                    </option>
                {% endfor %}
            </select>

        </div>

        <label class="add-label">Front</label>
        <textarea name="front" class="add-card" required></textarea>

        <label class="add-label">Back</label>
        <textarea name="back" class="add-card" required></textarea>

        <label class="reverse-label">
            <input
                type="checkbox"
                name="add_reverse"
                value="yes"

                {% if add_reverse == "yes" %}
                    checked
                {% endif %}
            >
            Add reverse card
        </label>

        <div class="button-row">

            <button
                type="submit"
                class="add-card-button"
                formaction="/add-card"
            >
                Add Card
            </button>

            <button
                type="submit"
                class="add-card-button"
                formaction="/smart-add-card/preview"
            >
                Smart Add
            </button>

            <a
                href="#"
                class="add-card-button"
                onclick="goToSelectedDeck(event)"
            >
                View Deck
            </a>

            <a
                href="#"
                class="add-card-button"
                onclick="goToSelectedReview(event)"
            >
                Review Cards
            </a>

        </div>
    </form>

    <script>
        const form = document.getElementById("add-card-form");

        form.addEventListener("keydown", function(event) {
            if (event.ctrlKey && event.key === "Enter") {
                event.preventDefault();
                form.requestSubmit();
            }
        });

        document.querySelectorAll(".add-card").forEach(textarea => {
            textarea.addEventListener("input", () => {
                textarea.style.height = "auto";
                textarea.style.height = textarea.scrollHeight + "px";
            });
        });

        function goToSelectedDeck(event) {
            event.preventDefault();

            const deckId = document.querySelector(
                "select[name='deck_id']"
            ).value;

            window.location.href = "/deck/" + deckId + "/cards";
        }

        function goToSelectedReview(event) {
            event.preventDefault();

            const deckId = document.querySelector(
                "select[name='deck_id']"
            ).value;

            window.location.href =
                "/review/" + deckId;
        }
    </script>
</body>
</html>
