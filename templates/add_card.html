<!DOCTYPE html>
<html>
<head>
    <title>Add Card</title>

    <style>

        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #f9fafb;
            color: #111827;
        }

        .site-banner {
            width: 100%;
            background: white;
            border-bottom: 1px solid #ffedd5;
            padding: 18px 40px;
            box-sizing: border-box;

            position: sticky;
            top: 0;
            left: 0;
            z-index: 1000;
        }

        .banner-content {
            max-width: 1200px;
            margin: 0 auto;

            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 24px;
        }

        .brand-section {
            display: flex;
            align-items: center;
            gap: 14px;
        }

        .logo-placeholder {
            width: 56px;
            height: 56px;
            border-radius: 12px;

            background: #ffffff;

            display: flex;
            align-items: center;
            justify-content: center;

            overflow: hidden;
            flex-shrink: 0;
        }

        .logo-image {
            width: 56px;
            height: 56px;
            object-fit: contain;
            display: block;
        }

        .brand-name {
            font-family: "Trebuchet MS", Arial, sans-serif;
            font-size: 44px;
            font-weight: bold;
            color: #f97316;
            letter-spacing: 0.5px;
            line-height: 1;
        }

        .page-title {
            font-size: 14px;
            color: #9a3412;
            margin-top: 4px;
            font-weight: bold;
        }

        .banner-actions {
            display: flex;
            gap: 12px;
            align-items: center;
            flex-wrap: wrap;
            justify-content: flex-end;
        }

        .banner-button,
        .back-button {
            text-decoration: none;

            background: #f97316;
            color: white;

            padding: 10px 18px;
            border-radius: 12px;

            border: none;

            font-family: inherit;
            font-size: 15px;
            font-weight: bold;

            cursor: pointer;
            transition:
                background 0.15s ease,
                transform 0.15s ease,
                box-shadow 0.15s ease;
        }

        .banner-button:hover,
        .back-button:hover {
            background: #ea580c;
            transform: translateY(-1px);
            box-shadow: 0 6px 14px rgba(249, 115, 22, 0.22);
        }

        .banner-button.secondary {
            background: #fff7ed;
            color: #f97316;
            border: 1px solid #ffedd5;
        }

        .banner-button.secondary:hover {
            background: #ffedd5;
            color: #ea580c;
        }

        .back-button {
            background: #111827;
        }

        .back-button:hover {
            background: #374151;
            box-shadow: 0 6px 14px rgba(17, 24, 39, 0.18);
        }

        .form-page {
            max-width: 1200px;
            margin: 0 auto;
            padding: 36px 24px 60px 24px;
            box-sizing: border-box;
        }

        .add-card-shell {
            background: white;
            border-radius: 28px;
            padding: 0 0 32px 0;

            box-shadow: 0 8px 28px rgba(0,0,0,0.08);
            border-top: 8px solid #f97316;

            overflow: hidden;
        }

        .top-controls {
            padding: 28px 32px;

            display: grid;
            grid-template-columns: 1fr auto 1fr;
            align-items: end;
            gap: 18px;

            box-sizing: border-box;

            background: #fff7ed;
            border-bottom: 1px solid #ffedd5;
        }

        .top-control-group {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .card-type-control {
            justify-self: start;
        }

        .deck-control {
            justify-self: end;
        }

        .add-label,
        .deck-selector-label {
            font-weight: bold;
            color: #374151;
        }

        .deck-selector {
            padding: 10px 14px;
            border-radius: 12px;
            border: 1px solid #d1d5db;
            font-size: 15px;
            background: white;
            font-family: inherit;
        }

        .deck-selector:focus {
            outline: 3px solid #ffedd5;
            border-color: #f97316;
        }

        .reverse-label {
            font-weight: bold;
        }

        .top-reverse-label {
            justify-self: center;

            display: flex;
            align-items: center;
            gap: 8px;

            padding: 11px 16px;
            border-radius: 999px;
            border: 1px solid #ffedd5;

            background: white;
            color: #374151;

            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
            white-space: nowrap;
            cursor: pointer;
        }

        .top-reverse-label:hover {
            background: #ffedd5;
        }

        .top-reverse-label input {
            accent-color: #f97316;
            cursor: pointer;
        }

        .card-field {
            position: relative;
            width: min(860px, calc(100% - 64px));
            margin: 42px auto;
        }

        .field-label {
            display: block;
            text-align: left;
            font-weight: 700;
            font-size: 18px;
            margin-bottom: 12px;
            color: #111827;
        }

        .editor-shell {
            position: relative;
        }

        .rich-editor {
            width: 100%;
            min-height: 150px;
            padding: 58px 20px 20px 20px;
            border: 1px solid #e5e7eb;
            border-radius: 20px;
            font-size: 20px;
            line-height: 1.6;
            box-sizing: border-box;
            background: white;
            text-align: center;

            box-shadow: 0 6px 18px rgba(0,0,0,0.04);
            transition:
                border-color 0.15s ease,
                box-shadow 0.15s ease;
        }

        .rich-editor:focus {
            outline: none;
            border-color: #f97316;
            box-shadow: 0 0 0 4px #ffedd5;
        }

        .rich-editor:empty::before {
            content: "Start typing...";
            color: #9ca3af;
            font-weight: 500;
        }

        .rich-editor img {
            max-width: 240px;
            max-height: 180px;
            display: block;
            margin: 12px auto;
            border-radius: 14px;
            box-shadow: 0 6px 16px rgba(0,0,0,0.08);
        }

        .field-toolbar {
            position: absolute;
            top: 10px;
            left: 10px;
            right: 10px;

            z-index: 10;

            display: flex;
            align-items: center;
            gap: 8px;
        }

        .toolbar-menu-button {
            flex-shrink: 0;

            border: none;
            background: #fff7ed;
            color: #f97316;
            padding: 8px 12px;
            border-radius: 10px;
            font-weight: 700;
            cursor: pointer;
        }

        .toolbar-menu-button:hover {
            background: #ffedd5;
        }

        .toolbar-dropdown {
            display: none;

            align-items: center;
            gap: 8px;
            flex-wrap: nowrap;

            background: transparent;
            border: none;
            box-shadow: none;
            padding: 0;

            overflow-x: auto;
            white-space: nowrap;
        }

        .field-toolbar.open .toolbar-dropdown {
            display: flex;
        }

        .toolbar-dropdown select,
        .toolbar-dropdown input,
        .toolbar-dropdown button {
            height: 34px;
            padding: 6px 8px;
            border-radius: 8px;
            border: 1px solid #d1d5db;
            background: white;
            color: #374151;
            font-weight: 600;
            flex-shrink: 0;
            font-family: inherit;
        }

        .toolbar-dropdown button:hover,
        .image-insert-button:hover {
            background: #ffedd5 !important;
            border-color: #f97316;
            color: #f97316;
        }

        .image-insert-button {
            background: #fff7ed !important;
            cursor: pointer;
        }

        .button-row {
            display: flex;
            justify-content: center;
            gap: 16px;
            margin: 34px auto 0 auto;
        }

        .add-card-button {
            display: inline-flex;
            align-items: center;
            justify-content: center;

            padding: 13px 22px;
            font-size: 16px;
            border-radius: 14px;
            border: none;
            background: #f97316;
            color: white;
            font-weight: bold;
            transition:
                background 0.15s ease,
                transform 0.15s ease,
                box-shadow 0.15s ease;
            cursor: pointer;
            text-decoration: none;
            font-family: inherit;
        }

        .add-card-button:hover {
            background: #ea580c;
            transform: translateY(-1px);
            box-shadow: 0 8px 18px rgba(249, 115, 22, 0.25);
        }

        .cloze-highlight {
            background: #ffedd5;
            color: #c2410c;
            padding: 2px 5px;
            border-radius: 6px;
            font-weight: bold;
        }

        .occlusion-editor {
            position: relative;
            min-height: 300px;
        }

        .occlusion-editor img {
            max-width: 100%;
            display: block;
            margin: 0 auto;
        }

        .occlusion-box {
            position: absolute;
            background: white;
            border: 2px solid #f97316;
            cursor: pointer;
            box-shadow: 0 4px 12px rgba(249,115,22,0.18);
        }

        #cloze-options,
        #image-occlusion-options {
            display: none;
        }

        .cloze-button {
            margin: 18px 0 0 0;
        }

        .occlusion-button {
            margin: 18px 0 0 0;
        }

        .tags-field {
            width: min(860px, calc(100% - 64px));
            margin: 12px auto 0 auto;
        }

        .tags-label {
            display: block;
            font-weight: bold;
            font-size: 16px;
            margin-bottom: 10px;
            color: #374151;
        }

        .tags-input {
            width: 100%;

            padding: 14px 18px;

            border: 1px solid #e5e7eb;
            border-radius: 16px;

            font-size: 16px;
            font-weight: 600;

            background: white;
            color: #111827;

            box-sizing: border-box;
            box-shadow: 0 4px 14px rgba(0,0,0,0.04);
        }

        .tags-input:focus {
            outline: none;
            border-color: #f97316;
            box-shadow: 0 0 0 4px #ffedd5;
        }

        .tags-input::placeholder {
            color: #9ca3af;
            font-weight: 500;
        }

        @media (max-width: 850px) {
            .site-banner {
                padding: 16px 20px;
            }

            .banner-content {
                flex-direction: column;
                align-items: flex-start;
                gap: 14px;
            }

            .banner-actions {
                width: 100%;
                justify-content: flex-start;
            }

            .brand-name {
                font-size: 36px;
            }

            .top-controls {
                grid-template-columns: 1fr 1fr;
                gap: 14px;
                padding: 22px;
                align-items: end;
            }

            .card-type-control {
                order: 1;
                justify-self: start;
            }

            .deck-control {
                order: 2;
                justify-self: end;
            }

            .top-reverse-label {
                order: 3;
                grid-column: 1 / 3;
                justify-self: center;
                margin-top: 4px;
            }

            .card-field {
                width: calc(100% - 36px);
                margin: 32px auto;
            }

            .field-label {
                text-align: left;
            }

            .button-row {
                flex-direction: column;
                align-items: center;
            }

            .add-card-button {
                width: min(320px, 100%);
                text-align: center;
            }

            .tags-field {
                width: calc(100% - 36px);
            }

            .field-toolbar {
                align-items: flex-start;
            }

            .toolbar-dropdown {
                max-width: calc(100vw - 110px);
            }
        }

        @media (max-width: 560px) {
            .top-controls {
                grid-template-columns: 1fr;
            }

            .card-type-control,
            .deck-control,
            .top-reverse-label {
                grid-column: auto;
                justify-self: stretch;
            }

            .top-control-group {
                flex-direction: column;
                align-items: stretch;
            }

            .top-reverse-label {
                justify-content: center;
            }

            .banner-button,
            .back-button {
                width: 100%;
                text-align: center;
                box-sizing: border-box;
            }
        }

    </style>
</head>

<body>
    <header class="site-banner">
        <div class="banner-content">
            <div class="brand-section">
                <div class="logo-placeholder">
                    <img
                        src="/static/images/banner_koi.svg"
                        class="logo-image"
                        alt="Lexikoi logo"
                    >
                </div>

                <div>
                    <div class="brand-name">Lexikoi</div>
                    <div class="page-title">Add Card</div>
                </div>
            </div>

            <div class="banner-actions">
                <a href="#" class="banner-button secondary" onclick="goToSelectedDeck(event)">
                    View Deck
                </a>

                <a href="#" class="banner-button secondary" onclick="goToSelectedReview(event)">
                    Review Deck
                </a>

                {% if back_language_deck_id %}
                    <a href="/language/{{ back_language_deck_id }}" class="back-button">
                        ← Back to Decks
                    </a>
                {% else %}
                    <a href="/hub" class="back-button">
                        ← Back to Decks
                    </a>
                {% endif %}
            </div>
        </div>
    </header>

    <main class="form-page">
        <section class="add-card-shell">
            <form
                id="add-card-form"
                action="/add-card"
                method="post"
                enctype="multipart/form-data"
            >
        <div class="top-controls">

            <div class="top-control-group card-type-control">
                <label class="add-label" for="card-type-select">
                    Card Type
                </label>

                <select name="card_type" id="card-type-select" class="deck-selector">
                    <option value="basic">Basic</option>
                    <option value="cloze">Cloze</option>
                    <option value="image_occlusion">Image Occlusion</option>
                </select>
            </div>

            <label class="reverse-label top-reverse-label">
                <input
                    type="checkbox"
                    name="add_reverse"
                    value="yes"
                    {% if add_reverse == "yes" %}
                        checked
                    {% endif %}
                >
                Add reverse card
            </label>

            <div class="top-control-group deck-control">
                <label class="deck-selector-label" for="deck-select">
                    Deck
                </label>

                <select name="deck_id" id="deck-select" required class="deck-selector">
                    {% for deck in decks %}
                        <option
                            value="{{ deck[0] }}"
                            {% if selected_deck_id and deck[0]|int == selected_deck_id|int %}
                                selected
                            {% endif %}
                        >
                            {{ deck[1] }}
                        </option>
                    {% endfor %}
                </select>
            </div>

        </div>

        <input type="hidden" name="front" id="front-hidden">
        <input type="hidden" name="back" id="back-hidden">

        <div id="basic-options">
            <div class="card-field">
                <label class="field-label" for="front-basic-editor">
                    Front
                </label>

                <div class="editor-shell">
                    <div class="field-toolbar">
                        <button
                            type="button"
                            class="toolbar-menu-button"
                            onclick="toggleToolbar(this)"
                        >
                            Options ▾
                        </button>

                        <div class="toolbar-dropdown">
                            <select class="font-family-select">
                                <option value="Arial">Arial</option>
                                <option value="Helvetica">Helvetica</option>
                                <option value="Verdana">Verdana</option>
                                <option value="Tahoma">Tahoma</option>
                                <option value="Trebuchet MS">Trebuchet MS</option>
                                <option value="Georgia">Georgia</option>
                                <option value="Times New Roman">Times New Roman</option>
                                <option value="Garamond">Garamond</option>
                                <option value="Palatino Linotype">Palatino</option>
                                <option value="Courier New">Courier New</option>
                                <option value="Consolas">Consolas</option>
                                <option value="Lucida Console">Lucida Console</option>
                                <option value="Comic Sans MS">Comic Sans</option>
                                <option value="Impact">Impact</option>
                            </select>

                            <select class="font-size-select">
                                <option value="8pt">8 pt</option>
                                <option value="10pt">10 pt</option>
                                <option value="12pt">12 pt</option>
                                <option value="14pt">14 pt</option>
                                <option value="16pt">16 pt</option>
                                <option value="18pt">18 pt</option>
                                <option value="20pt">20 pt</option>
                                <option value="24pt" selected>24 pt</option>
                                <option value="28pt">28 pt</option>
                                <option value="32pt">32 pt</option>
                                <option value="36pt">36 pt</option>
                                <option value="42pt">42 pt</option>
                                <option value="48pt">48 pt</option>
                                <option value="60pt">60 pt</option>
                                <option value="72pt">72 pt</option>
                            </select>

                            <input type="color" class="text-color-select" value="#000000">

                            <button type="button" onclick="formatSelection('bold')">B</button>
                            <button type="button" onclick="formatSelection('italic')">I</button>
                            <button type="button" onclick="insertLatex()">LaTeX</button>

                            <button
                                type="button"
                                class="image-insert-button"
                                onclick="chooseImageFor('front')"
                            >
                                Insert Image
                            </button>
                        </div>
                    </div>

                    <div
                        id="front-basic-editor"
                        class="rich-editor"
                        contenteditable="true"
                        tabindex="0"
                    ></div>
                </div>
            </div>

            <div class="card-field">
                <label class="field-label" for="back-editor">
                    Back
                </label>

                <div class="editor-shell">
                    <div class="field-toolbar">
                        <button
                            type="button"
                            class="toolbar-menu-button"
                            onclick="toggleToolbar(this)"
                        >
                            Options ▾
                        </button>

                        <div class="toolbar-dropdown">
                            <select class="font-family-select">
                                <option value="Arial">Arial</option>
                                <option value="Helvetica">Helvetica</option>
                                <option value="Verdana">Verdana</option>
                                <option value="Tahoma">Tahoma</option>
                                <option value="Trebuchet MS">Trebuchet MS</option>
                                <option value="Georgia">Georgia</option>
                                <option value="Times New Roman">Times New Roman</option>
                                <option value="Garamond">Garamond</option>
                                <option value="Palatino Linotype">Palatino</option>
                                <option value="Courier New">Courier New</option>
                                <option value="Consolas">Consolas</option>
                                <option value="Lucida Console">Lucida Console</option>
                                <option value="Comic Sans MS">Comic Sans</option>
                                <option value="Impact">Impact</option>
                            </select>

                            <select class="font-size-select">
                                <option value="8pt">8 pt</option>
                                <option value="10pt">10 pt</option>
                                <option value="12pt">12 pt</option>
                                <option value="14pt">14 pt</option>
                                <option value="16pt">16 pt</option>
                                <option value="18pt">18 pt</option>
                                <option value="20pt">20 pt</option>
                                <option value="24pt" selected>24 pt</option>
                                <option value="28pt">28 pt</option>
                                <option value="32pt">32 pt</option>
                                <option value="36pt">36 pt</option>
                                <option value="42pt">42 pt</option>
                                <option value="48pt">48 pt</option>
                                <option value="60pt">60 pt</option>
                                <option value="72pt">72 pt</option>
                            </select>

                            <input type="color" class="text-color-select" value="#000000">

                            <button type="button" onclick="formatSelection('bold')">B</button>
                            <button type="button" onclick="formatSelection('italic')">I</button>
                            <button type="button" onclick="insertLatex()">LaTeX</button>

                            <button
                                type="button"
                                class="image-insert-button"
                                onclick="chooseImageFor('back')"
                            >
                                Insert Image
                            </button>
                        </div>
                    </div>

                    <div
                        id="back-editor"
                        class="rich-editor"
                        contenteditable="true"
                        tabindex="0"
                    ></div>
                </div>
            </div>
        </div>

        <div id="cloze-options">

            <div class="card-field">

                <label class="field-label">
                    Cloze Text
                </label>

                <div class="editor-shell">

                    <div class="field-toolbar">
                        <button
                            type="button"
                            class="toolbar-menu-button"
                            onclick="toggleToolbar(this)"
                        >
                            Options ▾
                        </button>

                        <div class="toolbar-dropdown">
                            <select class="font-family-select">
                                <option value="Arial">Arial</option>
                                <option value="Helvetica">Helvetica</option>
                                <option value="Verdana">Verdana</option>
                                <option value="Georgia">Georgia</option>
                                <option value="Times New Roman">Times New Roman</option>
                                <option value="Courier New">Courier New</option>
                            </select>

                            <select class="font-size-select">
                                <option value="12pt">12 pt</option>
                                <option value="16pt">16 pt</option>
                                <option value="20pt">20 pt</option>
                                <option value="24pt" selected>24 pt</option>
                                <option value="32pt">32 pt</option>
                                <option value="48pt">48 pt</option>
                            </select>

                            <input
                                type="color"
                                class="text-color-select"
                                value="#000000"
                            >

                            <button type="button" onclick="formatSelection('bold')">
                                B
                            </button>

                            <button type="button" onclick="formatSelection('italic')">
                                I
                            </button>

                            <button type="button" onclick="insertLatex()">
                                LaTeX
                            </button>

                            <button
                                type="button"
                                class="image-insert-button"
                                onclick="chooseImageFor('cloze')"
                            >
                                Insert Image
                            </button>
                        </div>
                    </div>

                    <div
                        id="cloze-editor"
                        class="rich-editor"
                        contenteditable="true"
                    ></div>

                </div>

                <button
                    type="button"
                    class="add-card-button cloze-button"
                    onclick="makeCloze()"
                >
                    Make Cloze
                </button>

            </div>

        </div>

        <div id="image-occlusion-options">

            <div class="card-field">

                <label class="field-label">
                    Image Occlusion
                </label>

                <div class="editor-shell">

                    <div class="field-toolbar">
                        <button
                            type="button"
                            class="toolbar-menu-button"
                            onclick="toggleToolbar(this)"
                        >
                            Options ▾
                        </button>

                        <div class="toolbar-dropdown">
                            <select class="font-family-select">
                                <option value="Arial">Arial</option>
                                <option value="Helvetica">Helvetica</option>
                                <option value="Verdana">Verdana</option>
                                <option value="Georgia">Georgia</option>
                                <option value="Times New Roman">Times New Roman</option>
                                <option value="Courier New">Courier New</option>
                            </select>

                            <select class="font-size-select">
                                <option value="12pt">12 pt</option>
                                <option value="16pt">16 pt</option>
                                <option value="20pt">20 pt</option>
                                <option value="24pt" selected>24 pt</option>
                                <option value="32pt">32 pt</option>
                                <option value="48pt">48 pt</option>
                            </select>

                            <input
                                type="color"
                                class="text-color-select"
                                value="#000000"
                            >

                            <button type="button" onclick="formatSelection('bold')">
                                B
                            </button>

                            <button type="button" onclick="formatSelection('italic')">
                                I
                            </button>

                            <button type="button" onclick="insertLatex()">
                                LaTeX
                            </button>

                            <button
                                type="button"
                                class="image-insert-button"
                                onclick="chooseImageFor('occlusion')"
                            >
                                Insert Image
                            </button>
                        </div>
                    </div>

                    <div
                        id="occlusion-editor"
                        class="rich-editor occlusion-editor"
                        contenteditable="true"
                        tabindex="0"
                    ></div>

                </div>

                <button
                    type="button"
                    class="add-card-button occlusion-button"
                    id="draw-occlusion-button"
                >
                    Draw Occlusion Box
                </button>

            </div>

        </div>

        <input
            type="file"
            id="image-file"
            name="image"
            accept="image/*"
            hidden
        >

        <input
            type="hidden"
            name="pasted_image_data"
            id="pasted-image-data"
        >

        <div class="tags-field">

            <label class="tags-label" for="tags">
                Tags / Labels
            </label>

            <input
                type="text"
                id="tags"
                name="tags"
                class="tags-input"
                placeholder="e.g. verbs, travel, irregular"
            >

        </div>

        <div class="button-row">
            <button type="submit" class="add-card-button">
                Add Card
            </button>
        </div>
            </form>
        </section>
    </main>

    <script>
        const form = document.getElementById("add-card-form");
        const cardTypeSelect = document.getElementById("card-type-select");

        const basicOptions = document.getElementById("basic-options");
        const clozeOptions = document.getElementById("cloze-options");
        const imageOcclusionOptions = document.getElementById("image-occlusion-options");

        const frontHidden = document.getElementById("front-hidden");
        const backHidden = document.getElementById("back-hidden");

        const frontBasicEditor = document.getElementById("front-basic-editor");
        const backEditor = document.getElementById("back-editor");
        const clozeEditor = document.getElementById("cloze-editor");
        const occlusionEditor = document.getElementById("occlusion-editor");

        const imageFileInput = document.getElementById("image-file");

        let activeEditor = frontBasicEditor;
        let savedRange = null;
        let activeImageTarget = null;

        function goToSelectedDeck(event) {
            event.preventDefault();

            const deckId = document.getElementById("deck-select").value;
            window.location.href = "/deck/" + deckId + "/cards";
        }

        function goToSelectedReview(event) {
            event.preventDefault();

            const deckId = document.getElementById("deck-select").value;
            window.location.href = "/review/" + deckId;
        }

        function updateCardTypeView() {
            const cardType = cardTypeSelect.value;

            basicOptions.style.display = cardType === "basic" ? "block" : "none";
            clozeOptions.style.display = cardType === "cloze" ? "block" : "none";
            imageOcclusionOptions.style.display = cardType === "image_occlusion" ? "block" : "none";
        }

        cardTypeSelect.addEventListener("change", function () {
            localStorage.setItem("selected_card_type", cardTypeSelect.value);
            updateCardTypeView();
        });

        const savedCardType = localStorage.getItem("selected_card_type");

        if (savedCardType) {
            cardTypeSelect.value = savedCardType;
        }

        updateCardTypeView();

        form.addEventListener("keydown", function (event) {
            if (event.ctrlKey && event.key === "Enter") {
                event.preventDefault();
                form.requestSubmit();
            }
        });

        form.addEventListener("submit", function () {
            if (cardTypeSelect.value === "cloze") {
                let html = clozeEditor.innerHTML;

                html = html.replace(
                    /<span class="cloze-highlight" data-cloze="true">(.*?)<\/span>/g,
                    "{% raw %}{{c1::$1}}{% endraw %}"
                );

                frontHidden.value = html.replace(/<[^>]+>/g, "");
                backHidden.value = "cloze";
                return;
            }

            if (cardTypeSelect.value === "image_occlusion") {
                frontHidden.value = occlusionEditor.innerHTML;
                backHidden.value = "image_occlusion";
                return;
            }

            frontHidden.value = frontBasicEditor.innerHTML;
            backHidden.value = backEditor.innerHTML;
        });

        function saveSelection() {
            const selection = window.getSelection();

            if (!selection.rangeCount) {
                return;
            }

            const range = selection.getRangeAt(0);
            const container = range.commonAncestorContainer;

            const editor = container.nodeType === Node.ELEMENT_NODE
                ? container.closest(".rich-editor")
                : container.parentElement.closest(".rich-editor");

            if (!editor) {
                return;
            }

            activeEditor = editor;
            savedRange = range.cloneRange();
        }

        function restoreSelection() {
            if (!savedRange) {
                activeEditor.focus();
                return;
            }

            const selection = window.getSelection();

            selection.removeAllRanges();
            selection.addRange(savedRange);
        }

        document.querySelectorAll(".rich-editor").forEach(function (editor) {
            editor.addEventListener("focus", function () {
                activeEditor = editor;
            });

            editor.addEventListener("mouseup", saveSelection);
            editor.addEventListener("keyup", saveSelection);
            editor.addEventListener("input", saveSelection);
        });

        function formatSelection(command) {
            restoreSelection();
            document.execCommand(command, false, null);
            saveSelection();
        }

        document.querySelectorAll(".font-family-select").forEach(function (select) {
            select.addEventListener("change", function () {
                restoreSelection();
                document.execCommand("fontName", false, this.value);
                saveSelection();
            });
        });

        document.querySelectorAll(".font-size-select").forEach(function (select) {
            select.addEventListener("change", function () {
                restoreSelection();

                const selection = window.getSelection();

                if (!selection.rangeCount || selection.toString().trim() === "") {
                    activeEditor.style.fontSize = this.value;
                    return;
                }

                const range = selection.getRangeAt(0);
                const span = document.createElement("span");

                span.style.fontSize = this.value;
                span.appendChild(range.extractContents());
                range.insertNode(span);

                saveSelection();
            });
        });

        document.querySelectorAll(".text-color-select").forEach(function (input) {
            input.addEventListener("change", function () {
                restoreSelection();
                document.execCommand("foreColor", false, this.value);
                saveSelection();
            });
        });

        function insertLatex() {
            const latex = prompt("Enter LaTeX, e.g. x^2 + y^2 = z^2");

            if (!latex) {
                return;
            }

            restoreSelection();

            document.execCommand(
                "insertHTML",
                false,
                `<span class="latex">\\(${latex}\\)</span>`
            );

            saveSelection();
        }

        function makeCloze() {
            restoreSelection();

            const selection = window.getSelection();

            if (!selection.rangeCount || selection.toString().trim() === "") {
                return;
            }

            const range = selection.getRangeAt(0);
            const span = document.createElement("span");

            span.className = "cloze-highlight";
            span.dataset.cloze = "true";

            span.appendChild(range.extractContents());
            range.insertNode(span);

            selection.removeAllRanges();
            saveSelection();
        }

        function chooseImageFor(target) {
            activeImageTarget = target;
            imageFileInput.click();
        }

        function getEditorForTarget(target) {
            if (target === "front") return frontBasicEditor;
            if (target === "back") return backEditor;
            if (target === "cloze") return clozeEditor;
            if (target === "occlusion") return occlusionEditor;

            return null;
        }

        function insertImageIntoEditor(src, target) {
            const editor = getEditorForTarget(target);

            if (!editor) {
                return;
            }

            const img = document.createElement("img");
            img.src = src;

            editor.appendChild(img);
        }

        imageFileInput.addEventListener("change", function () {
            const file = this.files[0];

            if (!file || !activeImageTarget) {
                return;
            }

            const reader = new FileReader();

            reader.onload = function (event) {
                insertImageIntoEditor(event.target.result, activeImageTarget);
                imageFileInput.value = "";
            };

            reader.readAsDataURL(file);
        });

        document.addEventListener("paste", function (event) {
            const activeElement = document.activeElement;

            if (!activeElement.classList.contains("rich-editor")) {
                return;
            }

            for (const item of event.clipboardData.items) {
                if (!item.type.startsWith("image/")) {
                    continue;
                }

                event.preventDefault();

                const file = item.getAsFile();
                const reader = new FileReader();

                reader.onload = function (e) {
                    const img = document.createElement("img");
                    img.src = e.target.result;

                    activeElement.appendChild(img);
                };

                reader.readAsDataURL(file);
                break;
            }
        });

        let drawingOcclusion = false;
        let startX = 0;
        let startY = 0;
        let currentBox = null;

        document
            .getElementById("draw-occlusion-button")
            .addEventListener("click", function () {
                drawingOcclusion = true;
            });

        occlusionEditor.addEventListener("mousedown", function (event) {
            if (!drawingOcclusion) {
                return;
            }

            const rect = occlusionEditor.getBoundingClientRect();

            startX = event.clientX - rect.left;
            startY = event.clientY - rect.top;

            currentBox = document.createElement("div");
            currentBox.className = "occlusion-box";

            currentBox.style.left = startX + "px";
            currentBox.style.top = startY + "px";
            currentBox.style.width = "0px";
            currentBox.style.height = "0px";

            occlusionEditor.appendChild(currentBox);
        });

        occlusionEditor.addEventListener("mousemove", function (event) {
            if (!drawingOcclusion || !currentBox) {
                return;
            }

            const rect = occlusionEditor.getBoundingClientRect();

            const currentX = event.clientX - rect.left;
            const currentY = event.clientY - rect.top;

            const left = Math.min(startX, currentX);
            const top = Math.min(startY, currentY);
            const width = Math.abs(currentX - startX);
            const height = Math.abs(currentY - startY);

            currentBox.style.left = left + "px";
            currentBox.style.top = top + "px";
            currentBox.style.width = width + "px";
            currentBox.style.height = height + "px";
        });

        document.addEventListener("mouseup", function () {
            if (!drawingOcclusion || !currentBox) {
                return;
            }

            drawingOcclusion = false;
            currentBox = null;
        });

        function toggleToolbar(button) {
            const toolbar = button.closest(".field-toolbar");
            toolbar.classList.toggle("open");
        }
    </script>
</body>
</html>
