<!DOCTYPE html>
<html>
<head>
    <title>Add Card</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            background: #ffffff;
        }

        .site-banner {
            width: 100%;
            background: #f5f5f5;
            border-bottom: 1px solid #ddd;
            padding: 18px 40px;
            box-sizing: border-box;
        }

        .banner-content {
            max-width: 1100px;
            margin: 0 auto;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .brand-section {
            display: flex;
            align-items: center;
            gap: 14px;
        }

        .logo-placeholder {
            width: 44px;
            height: 44px;
            border-radius: 12px;
            background: #2563eb;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
        }

        .brand-name {
            font-size: 24px;
            font-weight: bold;
        }

        .banner-right {
            color: #666;
        }

        .banner-button {
            text-decoration: none;

            background: #2563eb;
            color: white;

            padding: 10px 18px;

            border-radius: 12px;

            font-weight: bold;

            transition: background 0.15s ease;
        }

        .banner-button:hover {
            background: #1d4ed8;
        }

        .page {
            max-width: 900px;
            margin: 60px auto;
            padding: 0 10px;
        }

        h1 {
            text-align: center;
        }

        .add-card {
            width: 70%;
            min-height: 30px;

            resize: none;

            overflow: hidden;

            padding: 12px;

            font-size: 16px;

            border-radius: 12px;

            border: 1px solid #ddd;

            box-sizing: border-box;

            font-size: large;
            text-align: center;

            display: flex;
            justify-content: center;
            align-items: center;

            margin: 0 auto -20px auto;
            
        }

        .add-label {
            display: block;
            text-align: center;
            font-weight: bold;
            margin: 50px auto 10px auto;
        }

        .add-card-button {
            display: block;
            margin: 10px 0px auto;
            padding: 12px 22px;
            font-size: 16px;
            border-radius: 14px;
            border: #2563eb;
            background: #2563eb;
            color: white;
            font-weight: bold;
            transition: background 0.15s ease;
            cursor: pointer;
            text-decoration: none;}

            .reverse-label {
                display: block;
                text-align: center;
                margin: 28px auto 0 auto;
                font-weight: bold;
            }

            .page-title {
                font-size: 14px;
                color: #666;
                margin-top: 2px;
                font-weight: bold;
            }

            .deck-selector-top-right {
                position: absolute;

                top: 100px;
                right: 40px;

                display: flex;
                align-items: center;

                gap: 10px;
            }

            .deck-selector-label {
                font-weight: bold;
            }

            .deck-selector {
                padding: 10px 14px;

                border-radius: 12px;

                border: 1px solid #ddd;

                font-size: 15px;
            }

            .button-row {
                display: flex;
                justify-content: center;
                gap: 16px;
                margin-top: 30px;
            }

            .smart-add-button {
                display: block;
                padding: 12px 22px;
                font-size: 16px;
                border-radius: 14px;
                border: none;
                background: #7c3aed;
                color: white;
                font-weight: bold;
                cursor: pointer;
                transition: background 0.15s ease;
            }

            .smart-add-button:hover {
                background: #6d28d9;
            }

            .banner-actions {
                display: flex;
                gap: 12px;
                align-items: center;
            }

            .banner-button.secondary {
                background: #e5e7eb;
                color: black;
            }

            .banner-button.secondary:hover {
                background: #d1d5db;
            }

            .cloze-editor {
                width: 70%;
                min-height: 120px;
                margin: 0 auto;
                padding: 16px;

                border: 1px solid #ddd;
                border-radius: 14px;

                font-size: 18px;
                line-height: 1.6;

                background: white;
            }

            .cloze-highlight {
                background: #dbeafe;
                color: #1d4ed8;
                padding: 2px 5px;
                border-radius: 6px;
                font-weight: bold;
            }

            @media (max-width: 800px) {
            .banner-content {
                flex-direction: column;
                align-items: flex-start;
                gap: 10px;
            }

            .banner-actions {
                flex-wrap: wrap;
            }

            .deck-selector-top-right {
                position: static;
                margin: 20px auto;
                justify-content: center;
            }

            .add-card {
                width: 92%;
            }

            .button-row {
                flex-direction: column;
                align-items: center;
            }

            .add-card-button {
                width: 80%;
                text-align: center;
            }
        }
    </style>
</head>
<body>
    <header class="site-banner">
        <div class="banner-content">
            <div class="brand-section">

                <div class="logo-placeholder">
                    L
                </div>

                <div>

                    <div class="brand-name">
                        LanguageApp
                    </div>

                    <div class="page-title">
                        Add Card
                    </div>

                </div>

            </div>

            <div class="banner-right">

                <div class="banner-actions">

                    <a
                        href="#"
                        class="banner-button secondary"
                        onclick="goToSelectedDeck(event)"
                    >
                        View Deck
                    </a>

                    <a
                        href="#"
                        class="banner-button secondary"
                        onclick="goToSelectedReview(event)"
                    >
                        Review Deck
                    </a>

                    <a href="/" class="banner-button">
                        ← Back to Decks
                    </a>

                </div>

            </div>
        </div>
    </header>

    <form id="add-card-form" action="/add-card" method="post">
        <div class="deck-selector-top-right">

            <label class="deck-selector-label">
                Deck
            </label>

            <select name="deck_id" required class="deck-selector">
                {% for deck in decks %}
                    <option
                        value="{{ deck[0] }}"
                        {% if selected_deck_id and deck[0] == selected_deck_id %}
                            selected
                        {% endif %}
                    >
                        {{ deck[1] }}
                    </option>
                {% endfor %}
            </select>

        </div>

        <label class="add-label">Card Type</label>

        <select name="card_type" id="card-type-select" class="deck-selector">
            <option value="basic">Basic</option>
            <option value="cloze">Cloze</option>
        </select>

        <input type="hidden" name="front" id="front-hidden">

        <div id="basic-options">

            <label class="add-label">Front</label>
            <textarea name="front_basic" class="add-card" id="front-basic-field"></textarea>

            <label class="add-label">Back</label>
            <textarea name="back" class="add-card" id="back-field"></textarea>

            <label class="reverse-label">
                <input
                    type="checkbox"
                    name="add_reverse"
                    value="yes"
                    {% if add_reverse == "yes" %}
                        checked
                    {% endif %}
                >
                Add reverse card
            </label>

        </div>

        <div id="cloze-options">

            <label class="add-label">Cloze Text</label>

            <div
                id="cloze-editor"
                class="cloze-editor"
                contenteditable="true"
            ></div>

            <input
                type="hidden"
                name="back"
                id="back-hidden"
                value="cloze"
            >

            <button
                type="button"
                class="add-card-button"
                onclick="makeCloze()"
            >
                Make Cloze
            </button>

        </div>

        <div class="button-row">

            <button
                type="submit"
                class="add-card-button"
                formaction="/add-card"
            >
                Add Card
            </button>

            <button
                type="submit"
                class="add-card-button"
                formaction="/smart-add-card/preview"
            >
                Smart Add
            </button>

        </div>
    </form>

    <script>
        const form = document.getElementById("add-card-form");
        const cardTypeSelect = document.getElementById("card-type-select");

        const basicOptions = document.getElementById("basic-options");
        const clozeOptions = document.getElementById("cloze-options");

        const frontBasicField = document.getElementById("front-basic-field");
        const backField = document.getElementById("back-field");
        const frontHidden = document.getElementById("front-hidden");
        const clozeEditor = document.getElementById("cloze-editor");

        form.addEventListener("keydown", function(event) {
            if (event.ctrlKey && event.key === "Enter") {
                event.preventDefault();
                form.requestSubmit();
            }
        });

        document.querySelectorAll(".add-card").forEach(textarea => {
            textarea.addEventListener("input", () => {
                textarea.style.height = "auto";
                textarea.style.height = textarea.scrollHeight + "px";
            });
        });

        function goToSelectedDeck(event) {
            event.preventDefault();

            const deckId = document.querySelector(
                "select[name='deck_id']"
            ).value;

            window.location.href = "/deck/" + deckId + "/cards";
        }

        function goToSelectedReview(event) {
            event.preventDefault();

            const deckId = document.querySelector(
                "select[name='deck_id']"
            ).value;

            window.location.href = "/review/" + deckId;
        }

        function makeCloze() {
            const selection = window.getSelection();

            if (!selection.rangeCount || selection.toString().trim() === "") {
                return;
            }

            const range = selection.getRangeAt(0);

            const span = document.createElement("span");
            span.className = "cloze-highlight";
            span.dataset.cloze = "true";

            range.surroundContents(span);

            selection.removeAllRanges();
        }

        function updateCardTypeView() {
            if (cardTypeSelect.value === "cloze") {
                basicOptions.style.display = "none";
                clozeOptions.style.display = "block";

                frontBasicField.required = false;
                backField.required = false;
            } else {
                basicOptions.style.display = "block";
                clozeOptions.style.display = "none";

                frontBasicField.required = true;
                backField.required = true;
            }
        }

        cardTypeSelect.addEventListener("change", function () {

            localStorage.setItem(
                "selected_card_type",
                cardTypeSelect.value
            );

            updateCardTypeView();
        });

        const savedCardType =
            localStorage.getItem("selected_card_type");

        if (savedCardType) {
            cardTypeSelect.value = savedCardType;
        }

        updateCardTypeView();

        form.addEventListener("submit", function () {
            if (cardTypeSelect.value === "cloze") {
                let html = clozeEditor.innerHTML;

                html = html.replace(
                    /<span class="cloze-highlight" data-cloze="true">(.*?)<\/span>/g,
                    "{% raw %}{{c1::$1}}{% endraw %}"
                );

                html = html.replace(/<[^>]+>/g, "");

                frontHidden.value = html;
                backField.value = "cloze";
            } else {
                frontHidden.value = frontBasicField.value;
            }
        });
    </script>
</body>
</html>
