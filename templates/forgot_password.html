<!DOCTYPE html>
<html>
<head>
    <title>Forgot Password</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            background: #f9fafb;
        }

        .page {
            min-height: 100vh;

            display: flex;
            align-items: center;
            justify-content: center;

            padding: 30px;
        }

        .card {
            width: 100%;
            max-width: 430px;

            background: white;
            border-radius: 24px;
            padding: 30px;

            box-shadow: 0 8px 30px rgba(0,0,0,0.12);
        }

        h1 {
            margin-top: 0;
            text-align: center;
        }

        p {
            color: #4b5563;
            line-height: 1.5;
        }

        label {
            display: block;
            font-weight: bold;
            margin-bottom: 7px;
        }

        input {
            width: 100%;

            padding: 12px 14px;

            border: 1px solid #d1d5db;
            border-radius: 12px;

            font-size: 15px;
            box-sizing: border-box;
        }

        button {
            width: 100%;

            margin-top: 18px;
            padding: 12px 14px;

            border: none;
            border-radius: 14px;

            background: #2563eb;
            color: white;

            font-weight: bold;
            cursor: pointer;
        }

        .message {
            margin-top: 16px;
            padding: 12px 14px;

            background: #ecfdf5;
            color: #065f46;

            border-radius: 12px;
            font-weight: bold;
        }

        .back-link {
            display: block;
            margin-top: 18px;
            text-align: center;
            color: #2563eb;
            text-decoration: none;
        }
    </style>
</head>

<body>

    <main class="page">

        <div class="card">

            <h1>Forgot password?</h1>

            <p>
                Enter your email address. If an account exists, a reset link will be sent.
            </p>

            <form
                action="/forgot-password"
                method="post"
            >
                <label>Email</label>

                <input
                    type="email"
                    name="email"
                    required
                >

                <button type="submit">
                    Send reset link
                </button>
            </form>

            {% if message %}
                <div class="message">
                    {{ message }}
                </div>
            {% endif %}

            <a
                href="/"
                class="back-link"
            >
                Back to log in
            </a>

        </div>

    </main>

</body>
</html>
