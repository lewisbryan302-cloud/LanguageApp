<!DOCTYPE html>
<html>
<head>
    <title>My Decks</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            background: #ffffff;
        }

        .site-banner {
            width: 100%;
            background: #f5f5f5;
            border-bottom: 1px solid #ddd;
            padding: 18px 40px;
            box-sizing: border-box;
        }

        .banner-content {
            max-width: 1100px;
            margin: 0 auto;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .brand-section {
            display: flex;
            align-items: center;
            gap: 14px;
        }

        .logo-placeholder {
            width: 44px;
            height: 44px;
            border-radius: 12px;
            background: #2563eb;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
        }

        .brand-name {
            font-size: 24px;
            font-weight: bold;
        }

        .banner-right {
            color: #666;
        }

        .page {
            max-width: 900px;
            margin: 60px auto;
            padding: 0 10px;
        }

        h1 {
            text-align: center;
        }

        .deck-grid {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .deck {
            background: rgb(255, 255, 255);
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 4px 16px rgba(0,0,0,0.08);

            position: relative;
            left: 0px;

            display: flex;
            flex-direction: column;
            justify-content: space-between;

            min-height: 120px;

            width: 50%;
            box-sizing: border-box;
        }

        .deck-title {
            text-decoration: none;
            color: black;
            font-size: 24px;
            font-weight: bold;
        }

        .count {
            color: #666;
            margin-top: 12px;
        }

        .deck-title-section {
            margin-top: 30px;
            text-align: center;
        }

        .deck-stats {
            display: flex;
            justify-content: space-between;

            gap: 10px;

            margin-top: 30px;

            padding-top: 18px;

            border-top: 1px solid #eee;
        }

        .stat-block {
            flex: 1;
            text-align: center;
        }

        .stat-label {
            font-size: 12px;
            color: #777;
            margin-bottom: 6px;
        }

        .stat-value {
            font-size: 22px;
            font-weight: bold;
        }

        .top-links {
            text-align: center;
            margin-bottom: 30px;
        }

        .menu-container {
            position: absolute;
            top: 12px;
            right: 12px;
        }

        .menu-button {
            background: none;
            border: none;
            font-size: 24px;
            cursor: pointer;
        }

        .menu {
            display: none;
            position: absolute;
            right: 0;
            top: 32px;
            background: white;
            border: 1px solid #ddd;
            border-radius: 10px;
            box-shadow: 0 4px 16px rgba(0,0,0,0.15);
            padding: 8px;
            min-width: 100px;
            z-index: 10;
        }

        .menu a,
        .menu button {
            display: block;
            width: 100%;
            background: none;
            border: none;
            padding: 8px 12px;
            text-align: left;
            font-size: 14px;
            color: black;
            text-decoration: none;
            cursor: pointer;
        }

        .menu a:hover,
        .menu button:hover {
            background: #f0f0f0;
        }
    </style>
</head>

<body>

    <header class="site-banner">
        <div class="banner-content">
            <div class="brand-section">
                <div class="logo-placeholder">L</div>
                <div class="brand-name">LanguageApp</div>
            </div>

            <div class="banner-right">
                Profile area
            </div>
        </div>
    </header>

    <main class="page">
        <h1>My Decks</h1>

        <div class="top-links">
            <a href="/add-card">Add Card</a> |
            <a href="/add-deck">Add Deck</a> |
            <a href="/smart-add-card">Smart Add Card</a>
        </div>

        <div class="deck-grid">
            {% for deck in decks %}
                <div class="deck">
                    <div class="menu-container">
                        <button class="menu-button" onclick="toggleMenu('{{ deck[0] }}')">⋮</button>

                        <div id="menu-{{ deck[0] }}" class="menu">
                            <a href="/deck/{{ deck[0] }}/cards">View Cards</a>
                            <a href="/rename-deck/{{ deck[0] }}">Rename</a>

                            <form action="/delete-deck/{{ deck[0] }}" method="post">
                                <button type="submit" onclick="return confirm('Delete this deck and all its cards?');">
                                    Delete
                                </button>
                            </form>
                        </div>
                    </div>

                    <div class="deck-title-section">
                        <a href="/review/{{ deck[0] }}" class="deck-title">
                            {{ deck[1] }}
                        </a>
                    </div>

                    <div class="deck-stats">

                        <div class="stat-block">
                            <div class="stat-label">Words Learnt</div>
                            <div class="stat-value">{{ deck[3] }}</div>
                        </div>

                        <div class="stat-block">
                            <div class="stat-label">New Cards</div>
                            <div class="stat-value">{{ deck[4] }}</div>
                        </div>

                        <div class="stat-block">
                            <div class="stat-label">To Review</div>
                            <div class="stat-value">{{ deck[5] }}</div>
                        </div>

                    </div>
                </div>
            {% endfor %}
        </div>
    </main>

    <script>
        function toggleMenu(deckId) {
            const menu = document.getElementById("menu-" + deckId);

            if (menu.style.display === "block") {
                menu.style.display = "none";
            } else {
                document.querySelectorAll(".menu").forEach(m => {
                    m.style.display = "none";
                });

                menu.style.display = "block";
            }
        }
    </script>
</body>
</html>
