<!DOCTYPE html>
<html>
<head>
    <title>My Decks</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            background: #ffffff;
        }

        .site-banner {
            width: 100%;
            background: #f5f5f5;
            border-bottom: 1px solid #ddd;
            padding: 18px 40px;
            box-sizing: border-box;
        }

        .banner-content {
            max-width: 1100px;
            margin: 0 auto;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .brand-section {
            display: flex;
            align-items: center;
            gap: 14px;
        }

        .logo-placeholder {
            width: 44px;
            height: 44px;
            border-radius: 12px;
            background: #2563eb;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
        }

        .brand-name {
            font-size: 24px;
            font-weight: bold;
        }

        .banner-right {
            color: #666;
        }

        .banner-button {
            text-decoration: none;

            background: #2563eb;
            color: white;

            padding: 10px 18px;

            border-radius: 12px;

            font-weight: bold;

            transition: background 0.15s ease;
        }

        .banner-button:hover {
            background: #1d4ed8;
        }

        .page {
            max-width: 900px;
            margin: 60px auto;
            padding: 0 10px;
        }

        h1 {
            text-align: center;
        }

        .top-links {
            text-align: center;
            margin-bottom: 30px;
        }

        .deck-grid {
            display: flex;
            flex-direction: column;
            gap: 10px;
            align-items: flex-start;
        }

        .deck {
            background: white;
            padding: 30px 30px 30px 55px;
            border-radius: 20px;
            box-shadow: 0 4px 16px rgba(0,0,0,0.08);

            position: relative;

            display: flex;
            flex-direction: column;
            justify-content: space-between;

            width: 50%;
            min-height: 150px;
            box-sizing: border-box;

            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        .deck.dragging {
            z-index: 1000;
            opacity: 0.95;
            transition: none;
            cursor: grabbing;
            box-shadow: 0 10px 28px rgba(0,0,0,0.16);
        }

        .deck-title-section {
            margin-top: 20px;
            text-align: center;
        }

        .deck-title {
            text-decoration: none;
            color: black;
            font-size: 24px;
            font-weight: bold;
        }

        .count {
            color: #666;
            margin-top: 12px;
        }

        .deck-stats {
            display: flex;
            justify-content: space-between;
            gap: 10px;
            margin-top: 30px;
            padding-top: 18px;
            border-top: 1px solid #eee;
        }

        .actions-deck {
            justify-content: center;
        }

        .deck-actions {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-top: 18px;
        }

        .deck-action-button {
            text-decoration: none;
            background: #f3f4f6;
            color: black;
            padding: 8px 12px;
            border-radius: 10px;
            font-size: 14px;
            font-weight: bold;
        }

        .deck-action-button.primary {
            background: #2563eb;
            color: white;
        }

        .deck-action-button:hover {
            background: #e5e7eb;
        }

        .deck-action-button.primary:hover {
            background: #1d4ed8;
        }

        .actions-list {
            display: flex;
            flex-direction: column;
            gap: 14px;
            margin-top: 24px;
        }

        .action-button {
            text-decoration: none;

            background: #f3f4f6;

            color: black;

            padding: 12px;

            border-radius: 12px;

            text-align: center;

            font-weight: bold;

            transition: background 0.15s ease;
        }

        .action-button:hover {
            background: #e5e7eb;
        }

        .stat-block {
            flex: 1;
            text-align: center;
        }

        .stat-label {
            font-size: 12px;
            color: #777;
            margin-bottom: 6px;
        }

        .stat-value {
            font-size: 22px;
            font-weight: bold;
        }

        .menu-container {
            position: absolute;
            top: 12px;
            right: 12px;
        }

        .menu-button {
            background: none;
            border: none;
            font-size: 24px;
            cursor: pointer;
        }

        .menu {
            display: none;
            position: absolute;
            right: 0;
            top: 32px;
            background: white;
            border: 1px solid #ddd;
            border-radius: 10px;
            box-shadow: 0 4px 16px rgba(0,0,0,0.15);
            padding: 8px;
            min-width: 100px;
            z-index: 10;
        }

        .menu a,
        .menu button {
            display: block;
            width: 80%;
            background: none;
            border: none;
            padding: 8px 12px;
            text-align: left;
            font-size: 14px;
            color: black;
            text-decoration: none;
            cursor: pointer;
        }

        .menu a:hover,
        .menu button:hover {
            background: #f0f0f0;
        }

        .drag-handle {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);

            display: flex;
            flex-direction: column;
            gap: 5px;

            cursor: grab;
            touch-action: none;
        }

        .drag-handle:active {
            cursor: grabbing;
        }

        .drag-dot {
            width: 10px;
            height: 10px;
            background: #bbb;
            border-radius: 3px;
        }

        .deck,
        .drag-handle,
        .deck * {
            -webkit-user-select: none;
            -ms-user-select: none;
            user-select: none;
        }

        .deck-placeholder {
            width: 50%;
            min-height: 150px;
            border-radius: 20px;
            border: 2px dashed #ddd;
            background: #fafafa;
            box-sizing: border-box;
        }
    </style>
</head>

<body>

    <header class="site-banner">
        <div class="banner-content">
            <div class="brand-section">
                <div class="logo-placeholder">L</div>
                <div class="brand-name">LanguageApp</div>
            </div>

            <div class="banner-right">

                <a href="/add-deck" class="banner-button">
                    + Add Deck
                </a>

            </div>
        </div>
    </header>

    <main class="page">
        <h1>My Decks</h1>

        <div class="deck-grid">
            {% for deck in decks %}
                <div class="deck" data-deck-id="{{ deck[0] }}">
                    <div class="drag-handle">
                        <div class="drag-dot"></div>
                        <div class="drag-dot"></div>
                        <div class="drag-dot"></div>
                    </div>
                    <div class="menu-container">
                        <button class="menu-button" onclick="toggleMenu('{{ deck[0] }}')">⋮</button>

                        <div id="menu-{{ deck[0] }}" class="menu">
                            <a href="/deck/{{ deck[0] }}/cards">View Cards</a>
                            <a href="/rename-deck/{{ deck[0] }}">Rename</a>

                            <form action="/delete-deck/{{ deck[0] }}" method="post">
                                <button type="submit" onclick="return confirm('Delete this deck and all its cards?');">
                                    Delete
                                </button>
                            </form>
                        </div>
                    </div>

                    <div class="deck-title-section">
                        <a href="/review/{{ deck[0] }}" class="deck-title">
                            {{ deck[1] }}
                        </a>
                    </div>

                    <div class="deck-stats">

                        <div class="stat-block">
                            <div class="stat-label">Words Learnt</div>
                            <div class="stat-value">{{ deck[3] }}</div>
                        </div>

                        <div class="stat-block">
                            <div class="stat-label">New Cards</div>
                            <div class="stat-value">{{ deck[4] }}</div>
                        </div>

                        <div class="stat-block">
                            <div class="stat-label">To Review</div>
                            <div class="stat-value">{{ deck[5] }}</div>
                        </div>

                    </div>
                    <div class="deck-actions">
                        <a href="/add-card?deck_id={{ deck[0] }}" class="deck-action-button">
                            Add Card
                        </a>

                        <a href="/deck/{{ deck[0] }}/cards" class="deck-action-button">
                            View Cards
                        </a>

                        <a href="/review/{{ deck[0] }}" class="deck-action-button primary">
                            Review
                        </a>
                    </div>
                </div>
            {% endfor %}
        </div>
    </main>

    <script>
        function toggleMenu(deckId) {
            const menu = document.getElementById("menu-" + deckId);

            if (menu.style.display === "block") {
                menu.style.display = "none";
            } else {
                document.querySelectorAll(".menu").forEach(m => {
                    m.style.display = "none";
                });

                menu.style.display = "block";
            }
        }

        let draggedDeck = null;
        let placeholder = null;
        let startY = 0;
        let startTop = 0;

        document.querySelectorAll(".drag-handle").forEach(handle => {
            handle.addEventListener("pointerdown", startDrag);
        });

        function startDrag(event) {
            draggedDeck = event.target.closest(".deck");

            startY = event.clientY;
            startTop = draggedDeck.offsetTop;

            placeholder = document.createElement("div");
            placeholder.className = "deck-placeholder";

            draggedDeck.parentNode.insertBefore(
                placeholder,
                draggedDeck.nextSibling
            );

            draggedDeck.classList.add("dragging");

            draggedDeck.style.position = "absolute";
            draggedDeck.style.width = draggedDeck.offsetWidth + "px";
            draggedDeck.style.left = draggedDeck.offsetLeft + "px";
            draggedDeck.style.top = startTop + "px";

            document.addEventListener("pointermove", dragMove);
            document.addEventListener("pointerup", endDrag);
        }

        function dragMove(event) {
            if (!draggedDeck) return;

            const movement = event.clientY - startY;

            draggedDeck.style.top = startTop + movement + "px";

            const deckGrid = document.querySelector(".deck-grid");

            const decks = [
                ...deckGrid.querySelectorAll(".deck:not(.dragging)")
            ];

            for (const deck of decks) {
                const box = deck.getBoundingClientRect();
                const middleY = box.top + box.height / 2;

                if (event.clientY < middleY) {
                    deckGrid.insertBefore(placeholder, deck);
                    return;
                }
            }

            deckGrid.appendChild(placeholder);
        }

        function endDrag() {
            if (!draggedDeck) return;

            placeholder.parentNode.insertBefore(draggedDeck, placeholder);
            placeholder.remove();

            draggedDeck.classList.remove("dragging");

            draggedDeck.style.position = "";
            draggedDeck.style.width = "";
            draggedDeck.style.left = "";
            draggedDeck.style.top = "";
            draggedDeck.style.transform = "";

            document.removeEventListener("pointermove", dragMove);
            document.removeEventListener("pointerup", endDrag);

            saveDeckOrder();

            draggedDeck = null;
            placeholder = null;
        }

        function saveDeckOrder() {

            const deckIds = [
                ...document.querySelectorAll(".deck")
            ].map(deck =>
                Number(deck.dataset.deckId)
            );

            fetch("/save-deck-order", {

                method: "POST",

                headers: {
                    "Content-Type": "application/json"
                },

                body: JSON.stringify({
                    deck_ids: deckIds
                })
            });
        }
    </script>
</body>
</html>
