<!DOCTYPE html>
<html>
<head>
    <title>Welcome</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            background: #f9fafb;
        }

        .page {
            min-height: 100vh;

            display: flex;
            align-items: center;
            justify-content: center;

            padding: 30px;
        }

        .welcome-card {
            width: 100%;
            max-width: 950px;

            display: grid;
            grid-template-columns: 1.1fr 1fr;
            gap: 30px;

            background: white;
            border-radius: 28px;
            padding: 36px;

            box-shadow: 0 8px 30px rgba(0,0,0,0.12);
        }

        .welcome-copy {
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .welcome-copy h1 {
            font-size: 42px;
            margin: 0 0 18px 0;
        }

        .welcome-copy p {
            font-size: 18px;
            color: #4b5563;
            line-height: 1.6;
        }

        .auth-panel {
            background: #f9fafb;
            border-radius: 22px;
            padding: 24px;
        }

        .auth-tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        .auth-tab {
            flex: 1;

            border: none;
            border-radius: 12px;

            padding: 10px 12px;

            font-weight: bold;
            cursor: pointer;

            background: #e5e7eb;
        }

        .auth-tab.active {
            background: #2563eb;
            color: white;
        }

        .auth-form {
            display: none;
        }

        .auth-form.active {
            display: block;
        }

        .form-group {
            margin-bottom: 16px;
        }

        label {
            display: block;
            font-weight: bold;
            margin-bottom: 7px;
        }

        input {
            width: 100%;

            padding: 12px 14px;

            border: 1px solid #d1d5db;
            border-radius: 12px;

            font-size: 15px;
            box-sizing: border-box;
        }

        .primary-button {
            width: 100%;

            margin-top: 8px;
            padding: 12px 14px;

            border: none;
            border-radius: 14px;

            background: #2563eb;
            color: white;

            font-weight: bold;
            cursor: pointer;
        }

        .primary-button:hover {
            background: #1d4ed8;
        }

        .forgot-link {
            display: block;

            margin-top: 14px;

            text-align: center;
            color: #2563eb;
            text-decoration: none;
            font-size: 14px;
        }

        .error-message {
            margin-bottom: 16px;
            padding: 12px 14px;

            background: #fee2e2;
            color: #991b1b;

            border-radius: 12px;
            font-weight: bold;
        }

        @media (max-width: 800px) {
            .welcome-card {
                grid-template-columns: 1fr;
            }

            .welcome-copy h1 {
                font-size: 34px;
            }
        }
    </style>
</head>

<body>

    <main class="page">

        <div class="welcome-card">

            <section class="welcome-copy">
                <h1>
                    Build your language memory.
                </h1>

                <p>
                    Create decks, import vocabulary, extract words from notes,
                    and review them with spaced repetition.
                </p>
            </section>

            <section class="auth-panel">

                {% if error_message %}
                    <div class="error-message">
                        {{ error_message }}
                    </div>
                {% endif %}

                <div class="auth-tabs">
                    <button
                        type="button"
                        class="auth-tab active"
                        onclick="showAuthForm('loginForm', this)"
                    >
                        Log In
                    </button>

                    <button
                        type="button"
                        class="auth-tab"
                        onclick="showAuthForm('signupForm', this)"
                    >
                        Create Account
                    </button>
                </div>

                <form
                    id="loginForm"
                    class="auth-form active"
                    action="/login"
                    method="post"
                >
                    <div class="form-group">
                        <label>Username</label>
                        <input
                            type="text"
                            name="username"
                            placeholder="Username"
                            required
                        >
                        <label>Email</label>

                        <input
                            type="email"
                            name="email"
                            required
                        >
                    </div>

                    <div class="form-group">
                        <label>Password</label>

                        <input
                            type="password"
                            name="password"
                            required
                        >
                    </div>

                    <button
                        type="submit"
                        class="primary-button"
                    >
                        Log In
                    </button>

                    <a
                        href="/forgot-password"
                        class="forgot-link"
                    >
                        Forgot password?
                    </a>
                </form>

                <form
                    id="signupForm"
                    class="auth-form"
                    action="/signup"
                    method="post"
                >
                    <div class="form-group">
                        <label>Email</label>

                        <input
                            type="email"
                            name="email"
                            required
                        >
                    </div>

                    <div class="form-group">
                        <label>Password</label>

                        <input
                            type="password"
                            name="password"
                            required
                        >
                    </div>

                    <div class="form-group">
                        <label>Confirm password</label>

                        <input
                            type="password"
                            name="confirm_password"
                            required
                        >
                    </div>

                    <button
                        type="submit"
                        class="primary-button"
                    >
                        Create Account
                    </button>
                </form>

            </section>

        </div>

    </main>

    <script>
        function showAuthForm(formId, clickedButton) {
            document.querySelectorAll(".auth-form").forEach(form => {
                form.classList.remove("active");
            });

            document.querySelectorAll(".auth-tab").forEach(tab => {
                tab.classList.remove("active");
            });

            document
                .getElementById(formId)
                .classList
                .add("active");

            clickedButton.classList.add("active");
        }
    </script>

</body>
</html>
